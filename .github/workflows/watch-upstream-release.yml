name: Watch Upstream Codex Release

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      codex_version:
        description: "@openai/codex version to publish. Use latest by default, or an exact version such as 0.120.0."
        required: false
        default: latest
        type: string
      overwrite_existing:
        description: Delete and recreate the release if vX.Y.Z already exists.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: watch-upstream-release
  cancel-in-progress: false

jobs:
  watch:
    name: Create repository release for a new Codex version
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
      PORTABLE_TEST_BASE_URL: ${{ secrets.PORTABLE_TEST_BASE_URL }}
      PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
      PORTABLE_TEST_MODEL: ${{ secrets.PORTABLE_TEST_MODEL }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN" || {
            echo "RELEASE_WORKFLOW_TOKEN is required because GITHUB_TOKEN cannot trigger downstream release workflows." >&2
            exit 1
          }
          test -n "$PORTABLE_TEST_BASE_URL"
          test -n "$PORTABLE_TEST_API_KEY"
          test -n "$PORTABLE_TEST_MODEL"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve target version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.codex_version }}
        run: |
          set -euo pipefail

          requested="${REQUESTED_VERSION:-}"
          if [ -z "$requested" ] || [ "$requested" = "latest" ]; then
            version="$(npm view @openai/codex version)"
          else
            version="$(npm view @openai/codex@"$requested" version)"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Resolved version is not a stable semver: $version" >&2
            exit 1
          fi

          echo "codex_version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$version" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=rust-v$version" >> "$GITHUB_OUTPUT"
          echo "npm_url=https://www.npmjs.com/package/@openai/codex/v/$version" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream release metadata
        id: upstream
        shell: bash
        env:
          UPSTREAM_TAG: ${{ steps.version.outputs.upstream_tag }}
        run: |
          set -euo pipefail

          release_json="$RUNNER_TEMP/upstream-release.json"
          gh api "repos/openai/codex/releases/tags/$UPSTREAM_TAG" > "$release_json"

          if [ "$(jq -r '.draft' "$release_json")" != "false" ]; then
            echo "Upstream release $UPSTREAM_TAG is still a draft" >&2
            exit 1
          fi

          if [ "$(jq -r '.prerelease' "$release_json")" != "false" ]; then
            echo "Upstream release $UPSTREAM_TAG is a prerelease" >&2
            exit 1
          fi

          compare_url="$(jq -r '.body // ""' "$release_json" | grep -Eo 'https://github\.com/openai/codex/compare/[^[:space:])"]+' | head -n 1 || true)"

          echo "release_json=$release_json" >> "$GITHUB_OUTPUT"
          echo "upstream_name=$(jq -r '.name // ""' "$release_json")" >> "$GITHUB_OUTPUT"
          echo "upstream_url=$(jq -r '.html_url' "$release_json")" >> "$GITHUB_OUTPUT"
          echo "compare_url=$compare_url" >> "$GITHUB_OUTPUT"

      - name: Prepare release target
        id: target
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          OVERWRITE_EXISTING: ${{ inputs.overwrite_existing }}
        run: |
          set -euo pipefail

          overwrite="${OVERWRITE_EXISTING:-false}"
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            exists=true
          else
            exists=false
          fi

          if [ "$exists" = true ] && [ "$overwrite" = true ]; then
            gh release delete "$RELEASE_TAG" --cleanup-tag -y --repo "$GITHUB_REPOSITORY"
            exists=false
          fi

          should_create=true
          if [ "$exists" = true ]; then
            should_create=false
          fi

          echo "overwrite=$overwrite" >> "$GITHUB_OUTPUT"
          echo "should_create=$should_create" >> "$GITHUB_OUTPUT"

      - name: Generate release notes with Codex
        id: notes
        if: steps.target.outputs.should_create == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.codex_version }}
          NPM_URL: ${{ steps.version.outputs.npm_url }}
          RELEASE_JSON: ${{ steps.upstream.outputs.release_json }}
          UPSTREAM_NAME: ${{ steps.upstream.outputs.upstream_name }}
          UPSTREAM_URL: ${{ steps.upstream.outputs.upstream_url }}
          COMPARE_URL: ${{ steps.upstream.outputs.compare_url }}
        run: |
          set -euo pipefail

          workdir="$RUNNER_TEMP/release-notes"
          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$workdir" "$CODEX_HOME"

          cat > "$CODEX_HOME/config.toml" <<EOF
          model = "${PORTABLE_TEST_MODEL}"
          model_provider = "portable_provider"

          [model_providers.portable_provider]
          name = "Portable Provider"
          base_url = "${PORTABLE_TEST_BASE_URL}"
          env_key = "PORTABLE_TEST_API_KEY"
          wire_api = "responses"
          EOF

          body_file="$workdir/upstream-body.md"
          jq -r '.body // ""' "$RELEASE_JSON" > "$body_file"

          prompt_file="$workdir/prompt.txt"
          cat > "$prompt_file" <<EOF
          Write the "What's Changed" portion of a markdown release summary for OpenAI Codex CLI ${RELEASE_VERSION}.
          This output will be embedded inside a larger portable-release document, so omit any outer title or wrapper.

          Requirements:
          - Use only the source material below.
          - Be aggressive about surfacing the most meaningful changes instead of compressing everything into a few short bullets.
          - Err on the side of including more concrete, high-signal changes when the source clearly supports them.
          - Prefer specific nouns, commands, subsystems, and platform names over vague wording.
          - Do not collapse unrelated feature areas into a single generic bullet if they can be summarized separately.
          - Focus on concrete features, fixes, platform/runtime behavior changes, and operationally relevant engineering improvements.
          - Do not mention this repository, GitHub Actions, or portable packaging.
          - Do not include source links, an outer title, or a trailing "Generated by" line — the outer document adds those.
          - Do not invent changes that are not supported by the source material.
          - Use exactly this markdown structure (note: the subsection headings are level-4 '####' so they nest under an external '###' heading):
            A short opening paragraph of 2 sentences.

            #### Highlights
            - 5 to 7 bullets.
            - Each bullet should be one sentence and may be longer than the previous version if needed for clarity.
            - Prioritize visible product or workflow changes first.

            #### Stability and fixes
            - 3 to 5 bullets.
            - Focus on behavior corrections, platform fixes, or reliability improvements.

            #### Engineering notes
            - 2 to 4 bullets.
            - Focus on release/build verification, architecture, storage, documentation, or maintainability work when it matters to advanced users and operators.
          - If the upstream release spans multiple domains, try to cover plugin/marketplace, TUI/app UX, memory/state management, MCP/app-server/realtime APIs, platform fixes, and release engineering where supported by the source.

          Upstream release title: ${UPSTREAM_NAME}
          Upstream release URL: ${UPSTREAM_URL}
          Upstream compare URL: ${COMPARE_URL:-N/A}

          Upstream release notes:
          $(cat "$body_file")
          EOF

          prompt="$(cat "$prompt_file")"
          generated_body_file="$workdir/generated-body.md"
          notes_file="$workdir/release-notes.md"

          npx -y @openai/codex@"$RELEASE_VERSION" exec \
            --skip-git-repo-check \
            --dangerously-bypass-approvals-and-sandbox \
            --color never \
            -C "$workdir" \
            -o "$generated_body_file" \
            "$prompt" < /dev/null

          grep -q '^#### Highlights$' "$generated_body_file"
          grep -q '^#### Stability and fixes$' "$generated_body_file"
          grep -q '^#### Engineering notes$' "$generated_body_file"

          {
            printf '### Codex CLI v%s — Portable Release\n\n' "$RELEASE_VERSION"
            printf 'Portable packaging of OpenAI Codex CLI v%s for 6 platforms, designed for air-gapped and proxy-only deployments that cannot reach npm at runtime.\n\n' "$RELEASE_VERSION"

            printf '### What'\''s Changed in Codex CLI v%s\n\n' "$RELEASE_VERSION"
            cat "$generated_body_file"

            printf '\n\n### Supported Platforms\n\n'
            printf '| Platform | Target | Notes |\n'
            printf '|----------|--------|-------|\n'
            printf '| Linux x86-64 (musl) | `x86_64-unknown-linux-musl` | Alpine 3.19+, statically linked |\n'
            printf '| Linux ARM64 (musl) | `aarch64-unknown-linux-musl` | Alpine ARM |\n'
            printf '| macOS Intel | `x86_64-apple-darwin` | macOS 13+ |\n'
            printf '| macOS Apple Silicon | `aarch64-apple-darwin` | macOS 13+ |\n'
            printf '| Windows x86-64 | `x86_64-pc-windows-msvc` | Windows 10+ |\n'
            printf '| Windows ARM64 | `aarch64-pc-windows-msvc` | Windows 11 ARM |\n'

            printf '\n### Quick Start\n\n'
            printf '```bash\n'
            printf 'tar xzf codex-portable-x86_64-unknown-linux-musl-v%s.tar.gz\n' "$RELEASE_VERSION"
            printf 'export HTTPS_PROXY=http://your-proxy:8080   # if behind a proxy\n'
            printf './codex-portable-x86_64-unknown-linux-musl-v%s/codex --version\n' "$RELEASE_VERSION"
            printf '```\n'

            printf '\n### Portable Packaging Notes\n\n'
            printf -- '- Single self-contained Rust binary — no Node.js, npm, or any package manager required on the target machine.\n'
            printf -- '- Standard proxy environment variables (`HTTPS_PROXY`, `HTTP_PROXY`, `NO_PROXY`) are honoured by the binary.\n'
            printf -- '- Bundles include the directory layout and archived form; verify with the published `.sha256` alongside each asset.\n'

            printf '\n### Source Links\n\n'
            printf -- '- Upstream release: %s\n' "$UPSTREAM_URL"
            if [ -n "${COMPARE_URL:-}" ]; then
              printf -- '- Compare: %s\n' "$COMPARE_URL"
            fi
            printf -- '- npm package: %s\n' "$NPM_URL"
            printf '\nPortable artifacts for Linux, macOS, and Windows are attached after the release smoke tests pass.\n'

            printf '\n---\n*Generated by [OpenAI Codex CLI](https://github.com/openai/codex) (rust-v%s)*\n' "$RELEASE_VERSION"
          } > "$notes_file"

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with retry
        if: steps.target.outputs.should_create == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.codex_version }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Codex Portable $RELEASE_VERSION" \
              --notes-file "$NOTES_FILE"; then
              exit 0
            fi

            gh release delete "$RELEASE_TAG" --cleanup-tag -y --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 || true
            sleep $((attempt * 5))
          done

          echo "Failed to create release $RELEASE_TAG after multiple attempts" >&2
          exit 1

      - name: Report skipped release
        if: steps.target.outputs.should_create != 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail
          echo "Release $RELEASE_TAG already exists; skipping creation."
