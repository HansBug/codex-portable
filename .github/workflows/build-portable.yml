name: Build Portable Codex

on:
  workflow_dispatch:
    inputs:
      codex_version:
        description: "@openai/codex version to build. Use latest by default, or an exact version such as 0.120.0."
        required: false
        default: latest
        type: string
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare build inputs
    runs-on: ubuntu-22.04
    outputs:
      codex_version: ${{ steps.resolve.outputs.codex_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      publish_to_release: ${{ steps.resolve.outputs.publish_to_release }}

    steps:
      - name: Resolve build context
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
            codex_version="${release_tag#v}"
            publish_to_release=true
          else
            release_tag=""
            codex_version="${{ inputs.codex_version }}"
            publish_to_release=false
          fi

          if [ -z "$codex_version" ]; then
            codex_version=latest
          fi

          echo "codex_version=$codex_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "publish_to_release=$publish_to_release" >> "$GITHUB_OUTPUT"

  build:
    name: Build on ${{ matrix.runner }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            artifact_name: codex-portable-linux-x64
          - runner: ubuntu-22.04-arm
            artifact_name: codex-portable-linux-arm64
          - runner: macos-15-intel
            artifact_name: codex-portable-macos-x64
          - runner: macos-14
            artifact_name: codex-portable-macos-arm64
          - runner: windows-2022
            artifact_name: codex-portable-windows-x64
          - runner: windows-11-arm
            artifact_name: codex-portable-windows-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build portable bundle
        id: build
        run: node scripts/build-portable.mjs --version "${{ needs.prepare.outputs.codex_version }}"

      - name: Archive bundle on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bundle_name="${{ steps.build.outputs.bundle_name }}"
          cd dist
          tar -czf "${bundle_name}.tar.gz" "${bundle_name}"
          zip -qr "${bundle_name}.zip" "${bundle_name}"
          sha256sum "${bundle_name}.tar.gz" "${bundle_name}.zip" > "${bundle_name}.sha256"

      - name: Archive bundle on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          bundle_name="${{ steps.build.outputs.bundle_name }}"
          cd dist
          tar -czf "${bundle_name}.tar.gz" "${bundle_name}"
          zip -qr "${bundle_name}.zip" "${bundle_name}"
          shasum -a 256 "${bundle_name}.tar.gz" "${bundle_name}.zip" > "${bundle_name}.sha256"

      - name: Archive bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleName = "${{ steps.build.outputs.bundle_name }}"
          Compress-Archive -Path "dist/$bundleName" -DestinationPath "dist/$bundleName.zip" -Force
          $hash = Get-FileHash "dist/$bundleName.zip" -Algorithm SHA256
          "{0}  {1}" -f $hash.Hash.ToLower(), (Split-Path $hash.Path -Leaf) | Set-Content "dist/$bundleName.sha256"

      - name: Stage artifact payload on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bundle_name="${{ steps.build.outputs.bundle_name }}"
          mkdir -p artifact-output
          cp "dist/${bundle_name}.tar.gz" artifact-output/
          cp "dist/${bundle_name}.zip" artifact-output/
          cp "dist/${bundle_name}.sha256" artifact-output/
          cp dist/build-metadata.json artifact-output/

      - name: Stage artifact payload on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleName = "${{ steps.build.outputs.bundle_name }}"
          New-Item -ItemType Directory -Path artifact-output -Force | Out-Null
          Copy-Item "dist/$bundleName.zip" artifact-output/
          Copy-Item "dist/$bundleName.sha256" artifact-output/
          Copy-Item "dist/build-metadata.json" artifact-output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact-output/*
          if-no-files-found: error
          retention-days: 1

  smoke-test:
    name: Smoke test on ${{ matrix.runner }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            artifact_name: codex-portable-linux-x64
          - runner: ubuntu-22.04-arm
            artifact_name: codex-portable-linux-arm64
          - runner: macos-15-intel
            artifact_name: codex-portable-macos-x64
          - runner: macos-14
            artifact_name: codex-portable-macos-arm64
          - runner: windows-2022
            artifact_name: codex-portable-windows-x64
          - runner: windows-11-arm
            artifact_name: codex-portable-windows-arm64

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact-input

      - name: Extract archive on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_path=$(find artifact-input -maxdepth 1 -name '*.tar.gz' | head -n 1)
          test -n "$archive_path"
          mkdir -p smoke
          tar -xzf "$archive_path" -C smoke
          bundle_dir=$(find smoke -mindepth 1 -maxdepth 1 -type d | head -n 1)
          test -n "$bundle_dir"
          echo "BUNDLE_DIR=$bundle_dir" >> "$GITHUB_ENV"

      - name: Extract archive on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Get-ChildItem artifact-input -Filter *.zip | Select-Object -First 1
          if (-not $archive) {
            throw 'Portable zip artifact not found'
          }
          New-Item -ItemType Directory -Path smoke -Force | Out-Null
          Expand-Archive -Path $archive.FullName -DestinationPath smoke -Force
          $bundleDir = Get-ChildItem smoke -Directory | Select-Object -First 1
          if (-not $bundleDir) {
            throw 'Expanded bundle directory not found'
          }
          "BUNDLE_DIR=$($bundleDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate smoke test secrets on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          PORTABLE_TEST_BASE_URL: ${{ secrets.PORTABLE_TEST_BASE_URL }}
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
          PORTABLE_TEST_MODEL: ${{ secrets.PORTABLE_TEST_MODEL }}
        run: |
          set -euo pipefail
          test -n "$PORTABLE_TEST_BASE_URL"
          test -n "$PORTABLE_TEST_API_KEY"
          test -n "$PORTABLE_TEST_MODEL"

      - name: Validate smoke test secrets on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PORTABLE_TEST_BASE_URL: ${{ secrets.PORTABLE_TEST_BASE_URL }}
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
          PORTABLE_TEST_MODEL: ${{ secrets.PORTABLE_TEST_MODEL }}
        run: |
          if (-not $env:PORTABLE_TEST_BASE_URL) {
            throw 'PORTABLE_TEST_BASE_URL is empty'
          }
          if (-not $env:PORTABLE_TEST_API_KEY) {
            throw 'PORTABLE_TEST_API_KEY is empty'
          }
          if (-not $env:PORTABLE_TEST_MODEL) {
            throw 'PORTABLE_TEST_MODEL is empty'
          }

      - name: Write config on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          PORTABLE_TEST_BASE_URL: ${{ secrets.PORTABLE_TEST_BASE_URL }}
          PORTABLE_TEST_MODEL: ${{ secrets.PORTABLE_TEST_MODEL }}
        run: |
          set -euo pipefail
          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          mkdir -p "$CODEX_HOME"
          cat > "$CODEX_HOME/config.toml" <<EOF
          model = "${PORTABLE_TEST_MODEL}"
          model_provider = "portable_provider"

          [model_providers.portable_provider]
          name = "Portable Provider"
          base_url = "${PORTABLE_TEST_BASE_URL}"
          env_key = "PORTABLE_TEST_API_KEY"
          wire_api = "responses"
          EOF
          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"

      - name: Write config on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PORTABLE_TEST_BASE_URL: ${{ secrets.PORTABLE_TEST_BASE_URL }}
          PORTABLE_TEST_MODEL: ${{ secrets.PORTABLE_TEST_MODEL }}
        run: |
          $codexHome = Join-Path $env:RUNNER_TEMP 'codex-home'
          New-Item -ItemType Directory -Path $codexHome -Force | Out-Null
          @"
          model = "$env:PORTABLE_TEST_MODEL"
          model_provider = "portable_provider"

          [model_providers.portable_provider]
          name = "Portable Provider"
          base_url = "$env:PORTABLE_TEST_BASE_URL"
          env_key = "PORTABLE_TEST_API_KEY"
          wire_api = "responses"
          "@ | Set-Content -Path (Join-Path $codexHome 'config.toml')
          "CODEX_HOME=$codexHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Basic smoke test on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
        run: |
          set -euo pipefail
          "$BUNDLE_DIR/codex" --version

          out_path="$RUNNER_TEMP/portable-last.txt"
          stderr_path="$RUNNER_TEMP/portable-stderr.log"
          attempts=5
          for attempt in $(seq 1 $attempts); do
            : > "$out_path"
            : > "$stderr_path"
            set +e
            "$BUNDLE_DIR/codex" exec \
              --skip-git-repo-check \
              --dangerously-bypass-approvals-and-sandbox \
              --color never \
              -C "$RUNNER_TEMP" \
              -o "$out_path" \
              'Reply with exactly PORTABLE_OK and stop.' \
              < /dev/null 2> "$stderr_path"
            codex_rc=$?
            set -e

            last_msg="$(tr -d '\r\n' < "$out_path" || true)"
            if [ "$codex_rc" -eq 0 ] && printf '%s' "$last_msg" | grep -Fq 'PORTABLE_OK'; then
              echo "Basic smoke attempt $attempt/$attempts succeeded."
              exit 0
            fi

            echo "::warning::Basic smoke attempt $attempt/$attempts failed (codex exit=$codex_rc)."
            echo "--- last agent message ---"
            cat "$out_path" || true
            echo "--- codex stderr (tail) ---"
            tail -n 80 "$stderr_path" || true
            echo "--------------------------"
            sleep $((attempt * 2))
          done

          echo "::error::Basic smoke test failed after $attempts attempts."
          echo "--- bundle portable-metadata.json ---"
          cat "$BUNDLE_DIR/portable-metadata.json" || true
          exit 1

      - name: Basic smoke test on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
        run: |
          $launcher = Join-Path $env:BUNDLE_DIR 'codex.ps1'
          & $launcher --version

          $outPath = Join-Path $env:RUNNER_TEMP 'portable-last.txt'
          $stderrPath = Join-Path $env:RUNNER_TEMP 'portable-stderr.log'
          $attempts = 5
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            Set-Content -Path $outPath -Value '' -NoNewline
            Set-Content -Path $stderrPath -Value '' -NoNewline
            $codexRc = 0
            try {
              & $launcher exec `
                --skip-git-repo-check `
                --dangerously-bypass-approvals-and-sandbox `
                --color never `
                -C $env:RUNNER_TEMP `
                -o $outPath `
                'Reply with exactly PORTABLE_OK and stop.' 2> $stderrPath
              $codexRc = $LASTEXITCODE
            } catch {
              $codexRc = if ($LASTEXITCODE) { $LASTEXITCODE } else { 1 }
            }

            $lastMsg = ''
            if (Test-Path $outPath) {
              $lastMsg = (Get-Content $outPath -Raw).Trim()
            }

            if ($codexRc -eq 0 -and $lastMsg -match 'PORTABLE_OK') {
              Write-Host "Basic smoke attempt $attempt/$attempts succeeded."
              exit 0
            }

            Write-Host "::warning::Basic smoke attempt $attempt/$attempts failed (codex exit=$codexRc)."
            Write-Host "--- last agent message ---"
            if (Test-Path $outPath) { Get-Content $outPath -Raw }
            Write-Host "--- codex stderr (tail) ---"
            if (Test-Path $stderrPath) { Get-Content $stderrPath -Tail 80 }
            Write-Host "--------------------------"
            Start-Sleep -Seconds ($attempt * 2)
          }

          Write-Host "::error::Basic smoke test failed after $attempts attempts."
          Write-Host "--- bundle portable-metadata.json ---"
          Get-Content (Join-Path $env:BUNDLE_DIR 'portable-metadata.json') -ErrorAction SilentlyContinue
          exit 1

      - name: Verify bundle layout on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          test -f "artifact-input/build-metadata.json"
          test -f "$BUNDLE_DIR/README-portable.txt"
          test -f "$BUNDLE_DIR/LICENSE"
          test -f "$BUNDLE_DIR/AGENTS.md"
          test -f "$BUNDLE_DIR/portable-metadata.json"
          test -f "$BUNDLE_DIR/codex"
          test -x "$BUNDLE_DIR/codex"
          test -f "$BUNDLE_DIR/bin/codex-real"
          test -x "$BUNDLE_DIR/bin/codex-real"
          test -f "$BUNDLE_DIR/bin/rg"

      - name: Verify bundle layout on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path 'artifact-input/build-metadata.json')) {
            throw 'build-metadata.json is missing'
          }
          foreach ($path in @(
            (Join-Path $env:BUNDLE_DIR 'README-portable.txt'),
            (Join-Path $env:BUNDLE_DIR 'LICENSE'),
            (Join-Path $env:BUNDLE_DIR 'AGENTS.md'),
            (Join-Path $env:BUNDLE_DIR 'portable-metadata.json'),
            (Join-Path $env:BUNDLE_DIR 'codex.cmd'),
            (Join-Path $env:BUNDLE_DIR 'codex.ps1'),
            (Join-Path (Join-Path $env:BUNDLE_DIR 'bin') 'codex-real.exe'),
            (Join-Path (Join-Path $env:BUNDLE_DIR 'bin') 'rg.exe'),
            (Join-Path (Join-Path $env:BUNDLE_DIR 'bin') 'codex-command-runner.exe'),
            (Join-Path (Join-Path $env:BUNDLE_DIR 'bin') 'codex-windows-sandbox-setup.exe')
          )) {
            if (-not (Test-Path $path)) {
              throw "Expected bundle path is missing: $path"
            }
          }

      - name: Tool read test on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
        run: |
          set -euo pipefail
          workspace="$RUNNER_TEMP/tool-read-workspace"
          rm -rf "$workspace"
          mkdir -p "$workspace"
          token=$(uuidgen | tr '[:upper:]' '[:lower:]')
          printf '%s' "$token" > "$workspace/challenge.txt"
          json_path="$RUNNER_TEMP/tool-read-events.jsonl"
          out_path="$RUNNER_TEMP/tool-read-last.txt"
          stderr_path="$RUNNER_TEMP/tool-read-stderr.log"
          attempts=5

          for attempt in $(seq 1 $attempts); do
            : > "$json_path"
            : > "$out_path"
            : > "$stderr_path"

            set +e
            "$BUNDLE_DIR/codex" exec \
              --json \
              --skip-git-repo-check \
              --dangerously-bypass-approvals-and-sandbox \
              --color never \
              -C "$workspace" \
              -o "$out_path" \
              "Use a shell command to read challenge.txt from the current working directory, then reply with exactly TOOL_READ_OK:$token and nothing else." \
              < /dev/null > "$json_path" 2> "$stderr_path"
            codex_rc=$?
            set -e

            token_ok=false
            exec_ok=false
            if grep -Fq "TOOL_READ_OK:$token" "$out_path"; then
              token_ok=true
            fi
            if grep -q '"type":"command_execution"' "$json_path"; then
              exec_ok=true
            fi

            if [ "$codex_rc" -eq 0 ] && [ "$token_ok" = true ] && [ "$exec_ok" = true ]; then
              echo "Tool read attempt $attempt/$attempts succeeded."
              exit 0
            fi

            echo "::warning::Tool read attempt $attempt/$attempts failed (codex exit=$codex_rc, token_match=$token_ok, command_execution_event=$exec_ok)."
            echo "--- last agent message ---"
            cat "$out_path" || true
            echo "--- JSON event stream (tail 80) ---"
            tail -n 80 "$json_path" || true
            echo "--- codex stderr (tail 40) ---"
            tail -n 40 "$stderr_path" || true
            echo "----------------------------------"
            sleep $((attempt * 2))
          done

          echo "::error::Tool read test failed after $attempts attempts."
          echo "--- bundle portable-metadata.json ---"
          cat "$BUNDLE_DIR/portable-metadata.json" || true
          echo "--- final JSON event stream (full) ---"
          cat "$json_path" || true
          exit 1

      - name: Tool read test on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
        run: |
          $workspace = Join-Path $env:RUNNER_TEMP 'tool-read-workspace'
          Remove-Item $workspace -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $workspace -Force | Out-Null
          $token = [guid]::NewGuid().ToString('N')
          Set-Content -Path (Join-Path $workspace 'challenge.txt') -Value $token -NoNewline

          $jsonPath = Join-Path $env:RUNNER_TEMP 'tool-read-events.jsonl'
          $outPath = Join-Path $env:RUNNER_TEMP 'tool-read-last.txt'
          $stderrPath = Join-Path $env:RUNNER_TEMP 'tool-read-stderr.log'
          $launcher = Join-Path $env:BUNDLE_DIR 'codex.ps1'
          $attempts = 5

          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            Set-Content -Path $jsonPath -Value '' -NoNewline
            Set-Content -Path $outPath -Value '' -NoNewline
            Set-Content -Path $stderrPath -Value '' -NoNewline

            $codexRc = 0
            try {
              & $launcher exec `
                --json `
                --skip-git-repo-check `
                --dangerously-bypass-approvals-and-sandbox `
                --color never `
                -C $workspace `
                -o $outPath `
                "Use a shell command to read challenge.txt from the current working directory, then reply with exactly TOOL_READ_OK:$token and nothing else." `
                > $jsonPath 2> $stderrPath
              $codexRc = $LASTEXITCODE
            } catch {
              $codexRc = if ($LASTEXITCODE) { $LASTEXITCODE } else { 1 }
            }

            $lastMsg = ''
            if (Test-Path $outPath) { $lastMsg = (Get-Content $outPath -Raw).Trim() }
            $tokenOk = $lastMsg -match [regex]::Escape("TOOL_READ_OK:$token")
            $execOk = Select-String -Path $jsonPath -Pattern '"type":"command_execution"' -SimpleMatch -Quiet

            if ($codexRc -eq 0 -and $tokenOk -and $execOk) {
              Write-Host "Tool read attempt $attempt/$attempts succeeded."
              exit 0
            }

            Write-Host "::warning::Tool read attempt $attempt/$attempts failed (codex exit=$codexRc, token_match=$tokenOk, command_execution_event=$execOk)."
            Write-Host "--- last agent message ---"
            if (Test-Path $outPath) { Get-Content $outPath -Raw }
            Write-Host "--- JSON event stream (tail 80) ---"
            if (Test-Path $jsonPath) { Get-Content $jsonPath -Tail 80 }
            Write-Host "--- codex stderr (tail 40) ---"
            if (Test-Path $stderrPath) { Get-Content $stderrPath -Tail 40 }
            Write-Host "----------------------------------"
            Start-Sleep -Seconds ($attempt * 2)
          }

          Write-Host "::error::Tool read test failed after $attempts attempts."
          Write-Host "--- bundle portable-metadata.json ---"
          Get-Content (Join-Path $env:BUNDLE_DIR 'portable-metadata.json') -ErrorAction SilentlyContinue
          Write-Host "--- final JSON event stream (full) ---"
          if (Test-Path $jsonPath) { Get-Content $jsonPath -Raw }
          exit 1

      - name: System operation test on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
        run: |
          set -euo pipefail
          workspace="$RUNNER_TEMP/system-op-workspace"
          token=$(uuidgen | tr '[:upper:]' '[:lower:]')
          json_path="$RUNNER_TEMP/system-op-events.jsonl"
          out_path="$RUNNER_TEMP/system-op-last.txt"
          stderr_path="$RUNNER_TEMP/system-op-stderr.log"
          probe_path="$workspace/system_probe.txt"
          attempts=5

          for attempt in $(seq 1 $attempts); do
            rm -rf "$workspace"
            mkdir -p "$workspace"
            : > "$json_path"
            : > "$out_path"
            : > "$stderr_path"

            set +e
            "$BUNDLE_DIR/codex" exec \
              --json \
              --skip-git-repo-check \
              --dangerously-bypass-approvals-and-sandbox \
              --color never \
              -C "$workspace" \
              -o "$out_path" \
              "Use shell commands to create a file named system_probe.txt in the current working directory containing exactly SYSTEM_PROBE_OK:$token and nothing else. After creating the file, reply with exactly SYSTEM_WRITE_OK and nothing else." \
              < /dev/null > "$json_path" 2> "$stderr_path"
            codex_rc=$?
            set -e

            reply_ok=false
            probe_ok=false
            exec_ok=false
            if grep -Fq 'SYSTEM_WRITE_OK' "$out_path"; then
              reply_ok=true
            fi
            if [ -f "$probe_path" ] && grep -Fq "SYSTEM_PROBE_OK:$token" "$probe_path"; then
              probe_ok=true
            fi
            if grep -q '"type":"command_execution"' "$json_path"; then
              exec_ok=true
            fi

            if [ "$codex_rc" -eq 0 ] && [ "$reply_ok" = true ] && [ "$probe_ok" = true ] && [ "$exec_ok" = true ]; then
              echo "System op attempt $attempt/$attempts succeeded."
              exit 0
            fi

            echo "::warning::System op attempt $attempt/$attempts failed (codex exit=$codex_rc, reply_match=$reply_ok, probe_match=$probe_ok, command_execution_event=$exec_ok)."
            echo "--- last agent message ---"
            cat "$out_path" || true
            echo "--- system_probe.txt (if any) ---"
            [ -f "$probe_path" ] && cat "$probe_path" || echo "(missing)"
            echo "--- JSON event stream (tail 80) ---"
            tail -n 80 "$json_path" || true
            echo "--- codex stderr (tail 40) ---"
            tail -n 40 "$stderr_path" || true
            echo "----------------------------------"
            sleep $((attempt * 2))
          done

          echo "::error::System operation test failed after $attempts attempts."
          echo "--- bundle portable-metadata.json ---"
          cat "$BUNDLE_DIR/portable-metadata.json" || true
          echo "--- final JSON event stream (full) ---"
          cat "$json_path" || true
          exit 1

      - name: System operation test on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PORTABLE_TEST_API_KEY: ${{ secrets.PORTABLE_TEST_API_KEY }}
        run: |
          $workspace = Join-Path $env:RUNNER_TEMP 'system-op-workspace'
          $token = [guid]::NewGuid().ToString('N')
          $jsonPath = Join-Path $env:RUNNER_TEMP 'system-op-events.jsonl'
          $outPath = Join-Path $env:RUNNER_TEMP 'system-op-last.txt'
          $stderrPath = Join-Path $env:RUNNER_TEMP 'system-op-stderr.log'
          $probePath = Join-Path $workspace 'system_probe.txt'
          $launcher = Join-Path $env:BUNDLE_DIR 'codex.ps1'
          $attempts = 5

          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            Remove-Item $workspace -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $workspace -Force | Out-Null
            Set-Content -Path $jsonPath -Value '' -NoNewline
            Set-Content -Path $outPath -Value '' -NoNewline
            Set-Content -Path $stderrPath -Value '' -NoNewline

            $codexRc = 0
            try {
              & $launcher exec `
                --json `
                --skip-git-repo-check `
                --dangerously-bypass-approvals-and-sandbox `
                --color never `
                -C $workspace `
                -o $outPath `
                "Use shell commands to create a file named system_probe.txt in the current working directory containing exactly SYSTEM_PROBE_OK:$token and nothing else. After creating the file, reply with exactly SYSTEM_WRITE_OK and nothing else." `
                > $jsonPath 2> $stderrPath
              $codexRc = $LASTEXITCODE
            } catch {
              $codexRc = if ($LASTEXITCODE) { $LASTEXITCODE } else { 1 }
            }

            $lastMsg = ''
            if (Test-Path $outPath) { $lastMsg = (Get-Content $outPath -Raw).Trim() }
            $probeContent = ''
            if (Test-Path $probePath) { $probeContent = (Get-Content $probePath -Raw).Trim() }

            $replyOk = $lastMsg -match 'SYSTEM_WRITE_OK'
            $probeOk = $probeContent -match [regex]::Escape("SYSTEM_PROBE_OK:$token")
            $execOk = Select-String -Path $jsonPath -Pattern '"type":"command_execution"' -SimpleMatch -Quiet

            if ($codexRc -eq 0 -and $replyOk -and $probeOk -and $execOk) {
              Write-Host "System op attempt $attempt/$attempts succeeded."
              exit 0
            }

            Write-Host "::warning::System op attempt $attempt/$attempts failed (codex exit=$codexRc, reply_match=$replyOk, probe_match=$probeOk, command_execution_event=$execOk)."
            Write-Host "--- last agent message ---"
            if (Test-Path $outPath) { Get-Content $outPath -Raw }
            Write-Host "--- system_probe.txt (if any) ---"
            if (Test-Path $probePath) { Get-Content $probePath -Raw } else { Write-Host '(missing)' }
            Write-Host "--- JSON event stream (tail 80) ---"
            if (Test-Path $jsonPath) { Get-Content $jsonPath -Tail 80 }
            Write-Host "--- codex stderr (tail 40) ---"
            if (Test-Path $stderrPath) { Get-Content $stderrPath -Tail 40 }
            Write-Host "----------------------------------"
            Start-Sleep -Seconds ($attempt * 2)
          }

          Write-Host "::error::System operation test failed after $attempts attempts."
          Write-Host "--- bundle portable-metadata.json ---"
          Get-Content (Join-Path $env:BUNDLE_DIR 'portable-metadata.json') -ErrorAction SilentlyContinue
          Write-Host "--- final JSON event stream (full) ---"
          if (Test-Path $jsonPath) { Get-Content $jsonPath -Raw }
          exit 1

  publish-release-assets:
    name: Publish release assets
    needs:
      - prepare
      - build
      - smoke-test
    if: needs.prepare.outputs.publish_to_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect archives for upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          while IFS= read -r -d '' file; do
            cp "$file" upload/
          done < <(find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.sha256' \) -print0)

          file_count=$(find upload -maxdepth 1 -type f | wc -l | tr -d ' ')
          test "$file_count" -gt 0
          ls -1 upload

      - name: Upload assets to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" upload/* --clobber --repo "$GITHUB_REPOSITORY"

  update-readme:
    name: Refresh generated README files
    needs:
      - prepare
      - publish-release-assets
    if: needs.prepare.outputs.publish_to_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up README rendering environment
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/readme-venv"
          . "$RUNNER_TEMP/readme-venv/bin/activate"
          python -m pip install --disable-pip-version-check --quiet jinja2

      - name: Fetch published release metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,url,publishedAt,assets \
            > "$RUNNER_TEMP/release.json"

      - name: Render README files from templates
        shell: bash
        env:
          PORTABLE_TEST_MODEL: ${{ secrets.PORTABLE_TEST_MODEL }}
        run: |
          set -euo pipefail
          . "$RUNNER_TEMP/readme-venv/bin/activate"
          python scripts/render-readme.py \
            --repo "$GITHUB_REPOSITORY" \
            --release-json "$RUNNER_TEMP/release.json" \
            --output-root "$GITHUB_WORKSPACE"

      - name: Commit refreshed README files
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md README_zh.md; then
            echo "README files already match $RELEASE_TAG; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README_zh.md
          git commit -m "Refresh README for $RELEASE_TAG [skip ci]"
          git push origin HEAD:main
